<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Help Us Improve | MNHS Portal</title>
  <style>
    :root {
      --primary: #2563eb; --primary-hover: #1d4ed8; --bg-sidebar: #1e293b;
      --bg-main: #f1f5f9; --white: #ffffff; --text-main: #0f172a;
      --text-muted: #64748b; --border: #e2e8f0; --radius: 16px;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

    /* --- ANIMATIONS --- */
    @keyframes slideInLeft {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- SIDEBAR & MOBILE DRAWER --- */
    .sidebar { 
        width: 260px; 
        background-color: var(--bg-sidebar); 
        color: #94a3b8; 
        display: flex; 
        flex-direction: column; 
        padding: 2rem 1.5rem; 
        flex-shrink: 0; 
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        z-index: 1001; 
        animation: slideInLeft 0.5s ease-out forwards;
    }
    .brand { color: var(--white); font-weight: 800; font-size: 1.2rem; margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center; }
    .close-sidebar { display: none; background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }

    .nav-link { text-decoration: none; color: #94a3b8; padding: 0.9rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; font-size: 0.95rem; font-weight: 500; transition: 0.3s; }
    .nav-link:hover { background: rgba(255, 255, 255, 0.08); color: var(--white); transform: translateX(5px); }
    .nav-link.active { background: var(--primary); color: var(--white); }

    /* --- MAIN CONTENT AREA --- */
    .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; width: 100%; }
    .header-bar { background: var(--white); height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.25rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    
    .content { padding: 2.5rem 1.25rem; max-width: 800px; margin: 0 auto; width: 100%; }
    
    .page-title { 
        text-align: center; 
        margin-bottom: 2rem; 
        opacity: 0; 
        animation: fadeInUp 0.6s ease-out forwards 0.2s;
    }
    .page-title h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 0.5rem; }

    /* FEEDBACK CARD REFINEMENT */
    .feedback-card { 
        background: var(--white); 
        border-radius: 24px; 
        padding: 2.5rem; 
        box-shadow: var(--shadow); 
        border: 1px solid var(--border); 
        opacity: 0;
        animation: fadeInUp 0.6s ease-out forwards 0.4s;
        transition: transform 0.3s ease;
    }
    
    .feedback-card:hover { transform: translateY(-5px); }

    .rating-section { display: flex; justify-content: center; gap: 12px; margin-bottom: 2rem; }
    .rating-btn { 
      flex: 1; 
      max-width: 60px;
      aspect-ratio: 1;
      border: 1px solid var(--border); 
      background: white; 
      border-radius: 14px; 
      font-size: 1.5rem;
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rating-btn:hover { transform: scale(1.15); border-color: var(--primary); }

    .rating-btn.selected { 
        background: #eff6ff; 
        border-color: var(--primary); 
        transform: scale(1.1); 
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); 
    }

    .form-group { margin-bottom: 1.5rem; }
    label { display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 10px; color: #475569; }
    
    textarea { 
        width: 100%; 
        padding: 1rem; 
        border-radius: 14px; 
        border: 1px solid var(--border); 
        background: #fdfdfd; 
        font-size: 16px; 
        transition: all 0.2s ease; 
        outline: none; 
        resize: none;
    }

    textarea:focus { 
        border-color: var(--primary); 
        background: #fff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
    
    .submit-btn { 
        width: 100%; 
        background: var(--primary); 
        color: white; 
        border: none; 
        padding: 1.1rem; 
        border-radius: 14px; 
        font-weight: 700; 
        cursor: pointer; 
        font-size: 1rem; 
        transition: all 0.3s ease; 
        margin-top: 1rem; 
    }

    .submit-btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); }
    .submit-btn:active { transform: scale(0.97); }
    
    .note { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }

    #menuBtn { background: #f1f5f9; border: none; font-size: 1.4rem; cursor: pointer; color: var(--bg-sidebar); padding: 8px; border-radius: 10px; display: none; }

    /* --- MOBILE RESPONSIVE --- */
    @media (max-width: 768px) {
      #menuBtn { display: flex; }
      .sidebar { position: fixed; left: 0; transform: translateX(-100%); height: 100%; box-shadow: 20px 0 50px rgba(0,0,0,0.1); animation: none; }
      .sidebar.show { transform: translateX(0); }
      .close-sidebar { display: block; }
      .content { padding: 1.5rem 1rem; }
      .feedback-card { padding: 1.5rem; border-radius: 20px; }
      .page-title h2 { font-size: 1.5rem; }
    }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 1000; }
    .sidebar-overlay.active { display: block; }
  </style>
</head>
<body>

  <div id="overlay" class="sidebar-overlay"></div>

  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <span>MNHS Portal</span>
      <button class="close-sidebar" id="closeSidebar">&times;</button>
    </div>
    <nav style="display: flex; flex-direction: column;">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="contact-developer.html" class="nav-link">Contact Developer</a>
      <a href="admin.html" class="nav-link">Admin Login</a>
      <a href="report-problems.html" class="nav-link">Report Problems</a>
      <a href="help-us-improve.html" class="nav-link active">Help Us Improve</a>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="header-bar">
      <button id="menuBtn">☰</button>
      <div style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); background: #f1f5f9; padding: 6px 14px; border-radius: 20px;">V1.0.0</div>
    </header>

    <main class="content">
      <div class="page-title">
        <h2>Your Feedback Matters</h2>
        <p>Help us make the portal better for everyone.</p>
      </div>

      <div class="feedback-card">
        <form id="feedbackForm">
          <label style="text-align: center; display: block; margin-bottom: 20px;">How satisfied are you with the platform?</label>
          <div class="rating-section">
            <button type="button" class="rating-btn" title="Dissatisfied">😞</button>
            <button type="button" class="rating-btn" title="Neutral">😐</button>
            <button type="button" class="rating-btn selected" title="Satisfied">😊</button>
            <button type="button" class="rating-btn" title="Love it!">🤩</button>
          </div>

          <div class="form-group">
            <label>What features would you like to see?</label>
            <textarea id="suggestedFeatures" rows="3" placeholder="e.g. SMS alerts, categories..."></textarea>
          </div>

          <div class="form-group">
            <label>Any other thoughts?</label>
            <textarea id="generalComments" rows="3" placeholder="Your suggestions..."></textarea>
          </div>

          <button type="submit" class="submit-btn">Send Feedback</button>
        </form>
        
        <p class="note">Thank you for supporting the MNHS Lost & Found project!</p>
      </div>
    </main>
  </div>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const closeSidebar = document.getElementById("closeSidebar");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const buttons = document.querySelectorAll('.rating-btn');

    // Drawer Logic
    const toggleMenu = () => {
      sidebar.classList.toggle("show");
      overlay.classList.toggle("active");
      document.body.style.overflow = sidebar.classList.contains("show") ? "hidden" : "auto";
    };

    menuBtn.onclick = toggleMenu;
    closeSidebar.onclick = toggleMenu;
    overlay.onclick = toggleMenu;

    // Rating Logic
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
    });
  </script>
  <script type="module" src="../js/submit.js"></script>

</body>
</html>
