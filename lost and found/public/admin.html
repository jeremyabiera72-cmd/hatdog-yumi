<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Lost & Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-sidebar: #1e293b;
      --bg-main: #f1f5f9;
      --white: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 16px;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* --- ANIMATIONS --- */
    @keyframes slideIn {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes pulseOnline {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 260px;
      background-color: var(--bg-sidebar);
      color: #94a3b8;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1001;
      animation: slideIn 0.5s ease-out;
    }

    .brand {
      color: var(--white);
      font-weight: 800;
      font-size: 1.2rem;
      margin-bottom: 3rem;
    }

    .nav-link {
      text-decoration: none;
      color: #94a3b8;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      transition: 0.3s ease;
      display: block;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--white);
      transform: translateX(5px);
    }

    .nav-link.active {
      background: var(--primary);
      color: var(--white);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    /* --- MAIN CONTENT --- */
    .main-wrapper {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      width: 100%;
    }

    .header-bar {
      background: var(--white);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .content { padding: 1.5rem 1rem; width: 100%; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
      margin-top: 1.5rem;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }

    .chart-container {
      background: white;
      padding: 1.5rem;
      border-radius: var(--radius);
      margin-bottom: 2rem;
      max-width: 450px;
      box-shadow: var(--shadow);
      animation: fadeInScale 0.6s ease-out;
    }

    /* --- LOGIN OVERLAY --- */
    .login-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 1rem;
    }

    .login-box {
      background: var(--white);
      padding: 2.5rem 2rem;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
      animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .hidden { display: none !important; }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: #fdfdfd;
      transition: 0.2s;
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      width: 100%;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3); }
    .btn-primary:active { transform: scale(0.98); }

    /* --- UI COMPONENTS --- */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      margin-right: 5px;
      animation: pulseOnline 2s infinite;
    }

    #menuBtn { 
      background: #f1f5f9; 
      border: none; 
      width: 40px; 
      height: 40px; 
      border-radius: 10px; 
      font-size: 1.2rem; 
      cursor: pointer; 
      display: none; 
      align-items: center; 
      justify-content: center;
    }

    @media (max-width: 900px) {
      #menuBtn { display: flex; }
      .sidebar { position: fixed; left: 0; transform: translateX(-100%); height: 100%; animation: none; }
      .sidebar.show { transform: translateX(0); }
      .grid { grid-template-columns: 1fr; }
      .chart-container { max-width: 100%; }
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
    }
    .sidebar-overlay.active { display: block; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="../js/admin.js" defer></script>
</head>
<body>

  <div id="overlay" class="sidebar-overlay"></div>

  <aside id="sidebar" class="sidebar">
    <div class="brand">MNHS Admin</div>
    <nav style="display: flex; flex-direction: column; height: 100%;">
      <a href="#" class="nav-link active">📊 Dashboard</a>
      <a href="admin-reports.html" class="nav-link">🪲 Bug Reports</a>
      <a href="index.html" class="nav-link">🏠 Back to Home</a>
      
      <div style="margin-top: auto;">
        <button onclick="logoutAdmin()" class="nav-link" style="color: #ef4444; border: none; background: none; width: 100%; text-align: left; cursor: pointer; font-weight: 700;">
          🚪 Logout
        </button>
      </div>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="header-bar">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button id="menuBtn">☰</button>
        <h2 id="headerTitle" style="font-size: 1.1rem; font-weight: 800; color: var(--text-main);" class="hidden">Admin Panel</h2>
      </div>
      <div style="font-size: 0.75rem; font-weight: 700; color: #10b981; background: #ecfdf5; padding: 6px 12px; border-radius: 20px; display: flex; align-items: center;">
        <span class="status-dot"></span> Online
      </div>
    </header>

    <main class="content">
      <section id="login" class="login-overlay">
        <div class="login-box">
          <div style="text-align: center; margin-bottom: 2rem;">
            <div style="background: #eff6ff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                <span style="font-size: 1.5rem;">🔒</span>
            </div>
            <h2 style="font-weight: 800; color: var(--text-main);">Admin Login</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem;">Authorized Access Only</p>
          </div>
          <input id="adminEmail" type="email" placeholder="Email Address" spellcheck="false">
          <input id="adminPass" type="password" placeholder="Password">
          <button id="loginBtn" class="btn-primary">Enter Dashboard</button>
        </div>
      </section>

      <section id="dashboard" class="hidden">
        <div class="chart-container">
          <h4 style="margin-bottom: 1.5rem; font-size: 1rem; font-weight: 800; color: var(--text-main);">Item Distribution</h4>
          <canvas id="pieChart"></canvas>
        </div>

        <div style="margin-top: 2rem;">
            <h3 style="font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px;">Pending Submissions</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">Review and approve new items.</p>
            <div id="pendingItems" class="grid"></div>
        </div>

        <div style="margin-top: 3.5rem;">
            <h3 style="font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px;">Community Feedback</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">Latest suggestions from users.</p>
            <div id="feedbackContainer" class="grid"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    const toggleMenu = () => {
        sidebar.classList.toggle("show");
        overlay.classList.toggle("active");
    };

    menuBtn.onclick = toggleMenu;
    overlay.onclick = toggleMenu;
  </script>

</body>
</html>
