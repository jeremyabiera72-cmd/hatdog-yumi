<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MNHS | Lost & Found Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #2563eb; --primary-dark: #1e40af; --bg-main: #f8fafc;
      --text-main: #1e293b; --text-muted: #64748b; --radius: 16px;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }
    
    /* --- ANIMATIONS --- */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }

    /* NAVBAR REFINEMENT */
    .navbar { 
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
      height: 70px; display: flex; align-items: center; justify-content: space-between; 
      padding: 0 1.5rem; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; 
    }
    .navbar h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; color: var(--primary); }

    /* SIDEBAR */
    .sidebar { 
      position: fixed; left: -280px; top: 0; width: 280px; height: 100%; 
      background: #1e293b; color: white; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      z-index: 2001; padding: 2rem; 
    }
    .sidebar.show { left: 0; }
    .sidebar-overlay { 
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); 
      display: none; z-index: 2000; backdrop-filter: blur(4px); 
    }
    .sidebar-overlay.active { display: block; }
    
    .sidebar a { 
      display: block; color: #94a3b8; text-decoration: none; padding: 0.8rem 1rem; 
      border-radius: 12px; margin-bottom: 0.5rem; font-weight: 500; transition: 0.3s;
    }
    .sidebar a:hover { background: rgba(255,255,255,0.1); color: white; transform: translateX(5px); }

    /* HERO AREA */
    .hero { 
      padding: 4rem 1.5rem; text-align: center; background: white;
      border-bottom: 1px solid #e2e8f0; animation: fadeInUp 0.6s ease-out;
    }
    .hero h2 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
    
    /* GRID SYSTEM */
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    
    .card { 
      background: white; border-radius: var(--radius); overflow: hidden; 
      box-shadow: var(--shadow); border: 1px solid #e2e8f0; transition: all 0.3s ease;
      animation: fadeInUp 0.6s ease-out backwards;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15); }
    
    .card-img-wrapper { width: 100%; height: 200px; overflow: hidden; background: #f1f5f9; }
    .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; }
    .card:hover img { transform: scale(1.1); }
    
    .card-content { padding: 1.5rem; }
    .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }

    /* MODAL */
    .modal { 
      display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); 
      backdrop-filter: blur(8px); z-index: 3000; align-items: center; justify-content: center; padding: 1rem; 
    }
    .form-container { 
      background: white; width: 100%; max-width: 500px; padding: 2rem; 
      border-radius: 24px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      animation: fadeInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* INPUTS */
    input, textarea, select { 
      width: 100%; margin-bottom: 12px; padding: 14px; border: 1px solid #e2e8f0; 
      border-radius: 12px; font-size: 16px; background: #fdfdfd; transition: 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

    /* BUTTONS */
    .btn { 
      padding: 0.85rem 1.5rem; border-radius: 12px; font-weight: 700; cursor: pointer; 
      border: none; transition: all 0.3s ease; font-size: 0.95rem; 
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3); }
    .btn-primary:active { transform: scale(0.95); }
    
    .btn-secondary { background: #f1f5f9; color: var(--text-main); }
    .btn-secondary:hover { background: #e2e8f0; }

    /* MOBILE */
    @media (max-width: 600px) {
      .hero { padding: 3rem 1rem; }
      .hero h2 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
      .form-container { padding: 1.5rem; border-radius: 24px; margin-bottom: 0; }
    }
  </style>

  <script type="module" src="../js/public.js" defer></script>
  <script type="module" src="../js/submit.js" defer></script>
</head>
<body>

<div id="overlay" class="sidebar-overlay"></div>

<nav class="navbar">
  <div style="display:flex; align-items:center; gap:12px;">
    <button id="menuBtn" style="background:#f1f5f9; border:none; font-size:1.3rem; cursor:pointer; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center;">☰</button>
    <h1>MNHS Portal</h1>
  </div>
  <button id="openSubmit" class="btn btn-primary">+ Submit Item</button>
</nav>

<aside id="sidebar" class="sidebar">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3rem;">
    <h2 style="font-size:1.5rem; font-weight: 800;">MNHS</h2>
    <button id="closeSidebar" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
  </div>
  <a href="index.html" style="background: rgba(255,255,255,0.1); color: white;">🏠 Home</a>
  <a href="admin.html">🔐 Admin Login</a>
  <a href="report-problems.html">⚠️ Report Problem</a>
  <a href="contact-developer.html">📞 Contact Admin</a>
  <a href="help-us-improve.html">💡 Help Us Improve</a>
</aside>

<header class="hero">
  <h2>Lost & Found Hub</h2>
  <p style="color:var(--text-muted); font-size: 1.1rem;">Helping students recover their belongings with ease.</p>
</header>

<main class="container">
  <div id="items" class="grid"></div>
</main>

<div id="modal" class="modal">
  <div class="form-container">
    <form id="submitForm">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h3 style="font-size:1.3rem; font-weight: 800;">Found Something?</h3>
        <span id="closeModalX" style="cursor:pointer; font-size:1.8rem; color:var(--text-muted);">&times;</span>
      </div>
      
      <input id="name" type="text" placeholder="Item Name (e.g., Blue Wallet)" required>
      <textarea id="desc" placeholder="Describe the item (color, brand, etc.)" required style="min-height:100px;"></textarea>
      <input id="place" type="text" placeholder="Where was it found?" required>
      <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted); margin-left: 5px;">Date Found</label>
      <input id="date" type="date" required>
      
      <div style="background: #eff6ff; padding: 1.5rem; border-radius: 16px; margin-bottom: 1.5rem; border: 1px solid #dbeafe;">
        <p style="font-size: 0.85rem; font-weight: 800; margin-bottom: 12px; color: var(--primary);">HOW TO CONTACT YOU:</p>
        <input id="contactPhone" type="tel" placeholder="Phone Number" required>
        <input id="contactFB" type="text" placeholder="Facebook Profile Link/Name" required>
        <input id="contactEmail" type="email" placeholder="Gmail Address (Optional)" style="margin-bottom:0;">
      </div>

      <label style="font-size: 0.85rem; font-weight: 800; display:block; margin-bottom:8px; color: var(--text-main);">Upload Item Photo</label>
      <input id="image" type="file" accept="image/*" required style="border: 1px dashed #cbd5e1; padding: 20px; text-align: center; cursor: pointer;">
      
      <div style="display:flex; gap:12px; margin-top: 1rem;">
        <button type="submit" id="submitBtn" class="btn btn-primary" style="flex:2;">Post Found Item</button>
        <button type="button" id="close" class="btn btn-secondary" style="flex:1;">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  const menuBtn = document.getElementById("menuBtn");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const closeSidebar = document.getElementById("closeSidebar");
  const modal = document.getElementById("modal");
  const openBtn = document.getElementById("openSubmit");
  const closeBtn = document.getElementById("close");
  const closeModalX = document.getElementById("closeModalX");

  // Sidebar Interaction
  const toggleSidebar = () => {
    sidebar.classList.toggle("show");
    overlay.classList.toggle("active");
    document.body.style.overflow = sidebar.classList.contains("show") ? "hidden" : "auto";
  };

  menuBtn.onclick = toggleSidebar;
  closeSidebar.onclick = toggleSidebar;
  overlay.onclick = toggleSidebar;

  // Modal Interaction
  openBtn.onclick = () => {
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
  };

  const hideModal = () => {
    modal.style.display = "none";
    document.body.style.overflow = "auto";
  };

  closeBtn.onclick = hideModal;
  closeModalX.onclick = hideModal;

  window.onclick = (e) => { 
    if(e.target === modal) hideModal();
  };
</script>
</body>
</html>
