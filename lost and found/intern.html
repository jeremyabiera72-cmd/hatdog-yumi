<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | MNHS Portal</title>

  <style>
    :root {
      --primary: #2563eb;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
        url("bg.jpg") no-repeat center center / cover;
    }

    .main-container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .split-card {
      display: flex;
      max-width: 900px;
      width: 100%;
      min-height: 480px;
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
      overflow: hidden;
      opacity: 0;
      transform: scale(0.95);
      animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .left-panel {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.03);
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .school-logo {
      width: 150px;
      height: 150px;
      background: #fff;
      border-radius: 50%;
      padding: 8px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      animation: float 6s ease-in-out infinite;
    }

    .school-logo img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .left-panel h2 {
      margin-top: 12px;
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
    }

    .right-panel {
      flex: 1.3;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: #fff;
    }

    .creator-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      padding: 8px 16px;
      background: rgba(0,0,0,0.45);
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      width: fit-content;
      opacity: 0;
      animation: fadeInRight 0.8s ease forwards 0.6s;
    }

    .creator-badge img {
      width: 32px;
      height: 32px;
    }

    .creator-text {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #3b82f6;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 15px;
      opacity: 0;
      animation: fadeInRight 0.8s ease forwards 0.8s;
    }

    .description {
      font-size: 1.1rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.7);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeInRight 0.8s ease forwards 1s;
    }

    .btn-enter {
      position: relative;
      display: inline-block;
      padding: 18px 50px;
      background: #fff;
      color: var(--primary);
      font-weight: 800;
      border-radius: 14px;
      text-decoration: none;
      overflow: hidden;
      transition: all 0.4s ease;
      width: fit-content;
      opacity: 0;
      animation: fadeInRight 0.8s ease forwards 1.2s;
    }

    .btn-enter::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.6),
        transparent
      );
      transition: 0.6s;
    }

    .btn-enter:hover {
      background: var(--primary);
      color: #fff;
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 20px 40px rgba(37,99,235,0.4);
    }

    .btn-enter:hover::before {
      left: 100%;
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    @media (max-width: 768px) {
      .split-card {
        flex-direction: column;
      }

      .left-panel {
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }

      .right-panel {
        text-align: center;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <div class="main-container">
    <div class="split-card">

      <div class="left-panel">
        <div class="school-logo">
          <img src="images/logo.jpeg" alt="MNHS Logo">
        </div>
        <h2>MNHS JHS</h2>
      </div>

      <div class="right-panel">
        <div class="creator-badge">
          <img src="images/meow.png" alt="Dev Logo">
          <span class="creator-text">TVL ICT HOBBES</span>
        </div>

        <h1>MNHS Portal</h1>

        <p class="description">
          Created for the community. Reconnecting students with their
          belongings through integrity and digital innovation.
        </p>

        <a href="public/index.html" class="btn-enter">Enter Portal</a>
      </div>

    </div>
  </div>

</body>
</html>
